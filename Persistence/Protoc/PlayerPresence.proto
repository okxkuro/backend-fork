syntax = "proto3";

message PlayerPresence {
    PlayerBasicPresence basicPresence = 1;
    PlayerPresenceExt ext = 2;
    string version = 3;
}

enum PlayerBasicPresence {
    Online = 0;
    Offline = 1;
}

message PlayerPresenceExt {
    string lastUpdated = 1;
    int32 mainPresenceId = 2;
    string presenceContext = 3;
}
